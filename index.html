<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Python</title>

<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
}

.codigo{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:10px;
    margin:20px 0;
    overflow:hidden;
}

.titulo{
    background:#21262d;
    padding:15px;
    font-weight:bold;
}

pre{
    margin:0;
    padding:20px;
    overflow:auto;
}

code{
    color:#58a6ff;
}
</style>
</head>
<body>

<h1>🐍 Minha Biblioteca Python</h1>

<div class="codigo">
    <div class="titulo">Calculadora.py</div>
    <pre><code>
num1 = float(input("Número 1: "))
num2 = float(input("Número 2: "))

print(num1 + num2)
    </code></pre>
</div>

<div class="codigo">
    <div class="titulo">Forca.py</div>
    <pre><code>
palavra = "python"

while True:
    letra = input("Digite uma letra: ")
    print(letra)
    </code></pre>
</div>

</body>
</html>
