<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio Python</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f1117;
    color:white;
    padding:30px;
}

header{
    text-align:center;
    margin-bottom:40px;
}

h1{
    color:#4da6ff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1b1f2b;
    border:1px solid #2d3447;
    border-radius:15px;
    padding:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#4da6ff;
}

.card h2{
    color:#4da6ff;
    margin-bottom:10px;
}

.card p{
    color:#bdbdbd;
    margin-bottom:15px;
}

.botao{
    display:inline-block;
    background:#4da6ff;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
}

.botao:hover{
    background:#2d8cff;
}
</style>
</head>
<body>

<header>
    <h1>🐍 Meu Portfólio Python</h1>
    <p>Biblioteca de projetos e scripts</p>
</header>

<div class="grid">

    <div class="card">
        <h2>Calculadora</h2>
        <p>Calculadora simples feita em Python.</p>
        <a href="codigos/calculadora.py" class="botao" target="_blank">
            Ver Código
        </a>
    </div>

    <div class="card">
        <h2>Jogo da Forca</h2>
        <p>Projeto de terminal usando listas e funções.</p>
        <a href="codigos/forca.py" class="botao" target="_blank">
            Ver Código
        </a>
    </div>

    <div class="card">
        <h2>Gerador de Senhas</h2>
        <p>Cria senhas aleatórias seguras.</p>
        <a href="codigos/senhas.py" class="botao" target="_blank">
            Ver Código
        </a>
    </div>

</div>

</body>
</html>
